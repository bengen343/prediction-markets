# Human-edited intent for which markets to track.
# Lives in GCS at gs://<project>-config/markets.yaml.
# Read by the kalshi-resolver (daily, 1am Mountain) which expands categories
# into the actual ticker list at gs://<project>-config/subscriptions.yaml.
# The collector reads subscriptions.yaml, not this file directly.
#
# Schema:
#   <source>:
#     categories: list of Kalshi category names; resolver discovers all open
#                 markets in any series matching that category.
#     tickers:    explicit ticker overrides; always followed regardless of
#                 category, even if not part of any tracked series.

# TODO: Add functionality to exclude certain tickers or categories.
kalshi:
  categories:
    - Politics
  tickers: []

polymarket:
  categories: []
  tickers: []
