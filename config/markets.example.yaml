# Human-edited intent for which markets to track.
# Lives in GCS at gs://<project>-config/markets.yaml.
# Read by each resolver (kalshi at 1am Mountain, polymarket at 3am Mountain)
# which expands these filters into the actual subscription list at
# gs://<project>-config/subscriptions.yaml. Each collector reads
# subscriptions.yaml, not this file directly.
#
# Schema:
#   kalshi:
#     categories: list of Kalshi category names; resolver discovers all open
#                 markets in any series matching that category.
#     tickers:    explicit ticker overrides; always followed regardless of
#                 category, even if not part of any tracked series.
#   polymarket:
#     tag_slug:   list of tag slugs (Polymarket has no real categories - the
#                 'category' field is dead/legacy and tags are the only topic
#                 signal). Resolver fetches /events/keyset?tag_slug=... and
#                 stores the markets nested under each event.
#     tickers:    explicit market_id overrides (not yet wired up).

# TODO: Add functionality to exclude certain tickers or categories.
kalshi:
  categories:
    - Politics
  tickers: []

polymarket:
  tag_slug:
    - politics
  tickers: []

# Optional. When enabled: true, the notifier publishes one Pub/Sub message per
# unique (source, market_id) per cycle to the `debate-requests` topic, which
# triggers the debate-worker Cloud Run service to spin up an LLM debate. Leave
# absent or set to false to run alert-only with no LLM dependencies.
debater:
  enabled: false
