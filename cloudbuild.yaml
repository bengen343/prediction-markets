# Cloud Build pipeline for the debater Cloud Run service. Triggered on pushes
# to main that touch src/prediction_markets/debater/**, this file, or
# pyproject.toml (see scripts/provision-gcp-debater.ps1 for trigger setup).
#
# Substitutions are wired up by the trigger:
#   _REGION           e.g. us-west1
#   _AR_REPO          artifact registry repo (default: prediction-markets-debater)
#   _SERVICE_NAME     cloud run service name (default: debate-worker)
#   _RUNTIME_SA_EMAIL run-time service account for the cloud run service

substitutions:
  _REGION: us-west1
  _AR_REPO: prediction-markets-debater
  _SERVICE_NAME: debate-worker

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - src/prediction_markets/debater/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
