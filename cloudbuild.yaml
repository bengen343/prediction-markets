# Cloud Build pipeline for the debater + discord-bot Cloud Run services.
# Triggered on pushes to main that touch src/prediction_markets/debater/**,
# src/prediction_markets/discord_bot/**, this file, or pyproject.toml (see
# scripts/provision-gcp-debater.ps1 for trigger setup).
#
# Substitutions are wired up by the trigger:
#   _REGION       e.g. us-west1
#   _AR_REPO      artifact registry repo (default: prediction-markets-debater)
#   _DEBATER_SVC  debate worker Cloud Run service name
#   _BOT_SVC      discord bot Cloud Run service name

substitutions:
  _REGION: us-west1
  _AR_REPO: prediction-markets-debater
  _DEBATER_SVC: debate-worker
  _BOT_SVC: discord-bot

steps:
  # --- debate-worker ---
  - id: build-debater
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - src/prediction_markets/debater/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DEBATER_SVC}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DEBATER_SVC}:latest
      - .

  - id: push-debater
    name: gcr.io/cloud-builders/docker
    waitFor: [build-debater]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DEBATER_SVC}

  - id: deploy-debater
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-debater]
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_DEBATER_SVC}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DEBATER_SVC}:${SHORT_SHA}

  # --- discord-bot (parallel build/push, deploy after image is ready) ---
  - id: build-bot
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - src/prediction_markets/discord_bot/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_BOT_SVC}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_BOT_SVC}:latest
      - .

  - id: push-bot
    name: gcr.io/cloud-builders/docker
    waitFor: [build-bot]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_BOT_SVC}

  - id: deploy-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-bot]
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_BOT_SVC}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_BOT_SVC}:${SHORT_SHA}

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DEBATER_SVC}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DEBATER_SVC}:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_BOT_SVC}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_BOT_SVC}:latest

options:
  logging: CLOUD_LOGGING_ONLY
